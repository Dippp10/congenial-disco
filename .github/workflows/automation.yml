name: GitHub Follower Bot

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  follow-bot:
    runs-on: ubuntu-latest

    env:
      GITHUB_USER: Dippp10
      PERSONAL_GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install pipenv

      - name: Install project dependencies
        run: pipenv install --deploy --ignore-pipfile

      - name: Run follower bot
        run: pipenv run python bot.py

      - name: Commit and Push Changes
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "Dippp10"
          git config user.email "deepikakarthik697@gmail.com"
          git add -A
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "Automated Commit: ${timestamp}" || echo "No changes"
          git push
