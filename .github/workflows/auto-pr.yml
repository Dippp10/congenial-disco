name: Auto PR Creator with Cleanup

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git user
        run: |
          git config user.name "OfficialCodeVoyage"
          git config user.email "bondarenkopavloua@yahoo.com"

      - name: Create timestamp update
        run: |
          mkdir -p updates
          echo "Last update: $(date -u)" >> updates/update.txt

      - name: Create unique branch and commit
        run: |
          BRANCH="auto-pr-${GITHUB_RUN_NUMBER}"
          git checkout -b $BRANCH
          git add updates/update.txt
          git commit -m "Automated update #${GITHUB_RUN_NUMBER}"
          git push origin $BRANCH

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          branch: "auto-pr-${{ github.run_number }}"
          title: "Automated Update PR #${{ github.run_number }}"
          body: "This PR was created automatically."
          base: main

      - name: Enable Auto Merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          merge-method: squash

      - name: Delete branch after merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          PR_NUMBER=${{ steps.cpr.outputs.pull-request-number }}
          echo "Waiting for PR #$PR_NUMBER to merge..."
          # Poll until PR is merged
          while true; do
            STATUS=$(curl -s -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER | jq -r .merged)
            if [ "$STATUS" = "true" ]; then
              echo "PR #$PR_NUMBER merged, deleting branch..."
              git push origin --delete "auto-pr-${GITHUB_RUN_NUMBER}"
              break
            else
              echo "PR not merged yet, waiting 10s..."
              sleep 10
            fi
          done
