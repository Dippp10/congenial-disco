name: Auto PR Creator

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create update file
        run: |
          date > update.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Automated update"
          branch: auto-pr-branch
          title: "Automated Update PR"
          body: "Auto-generated PR for contribution activity"
          base: main

      - name: Enable auto merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          merge-method: squash
