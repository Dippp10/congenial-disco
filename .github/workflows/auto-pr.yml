name: Auto PR Creator

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Create timestamp update
        run: |
          # Create update.txt if it doesn't exist, or append timestamp
          mkdir -p updates
          echo "Last update: $(date -u)" >> updates/update.txt

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          commit-message: "Automated update"
          branch: "auto-pr-branch-${{ github.run_number }}"
          title: "Automated Update PR #${{ github.run_number }}"
          body: "This PR was created automatically to increase contribution activity."
          base: main

      - name: Enable Auto Merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          merge-method: squash
