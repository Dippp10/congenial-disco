name: Auto PR + Auto-Merge

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      # 2. Configure Git
      - name: Configure Git
        run: |
          git config user.name "Dippp10"
          git config user.email "deepikakarthik697@gmail.com"

      # 3. Create a unique update
      - name: Create unique update
        run: |
          mkdir -p updates
          # Use timestamp and random string to ensure uniqueness
          echo "Update: $(date -u) | Random: $RANDOM" >> updates/update-${GITHUB_RUN_NUMBER}.txt

      # 4. Create branch and push
      - name: Create branch and push
        run: |
          BRANCH="auto-pr-${GITHUB_RUN_NUMBER}"
          git checkout -b $BRANCH
          git add updates/
          git commit -m "Automated update #${GITHUB_RUN_NUMBER}"
          git push origin $BRANCH

      # 5. Create Pull Request
      - name: Create Pull Request
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          branch: "auto-pr-${{ github.run_number }}"
          title: "Automated Update PR #${{ github.run_number }}"
          body: "This PR was created automatically."
          base: main

      # 6. Enable Auto Merge
      - name: Enable Auto Merge
        if: steps.pr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          merge-method: squash
