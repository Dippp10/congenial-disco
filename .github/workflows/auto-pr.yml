name: Auto PR Creator with Cleanup

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      # Configure Git
      - name: Configure Git user
        run: |
          git config user.name "Dippp10"
          git config user.email "deepikakarthik697@gmail.com"

      # Timestamp update
      - name: Create timestamp update
        run: |
          mkdir -p updates
          echo "Last update: $(date -u)" >> updates/update.txt

      # Create branch and commit
      - name: Create branch and push
        run: |
          BRANCH="auto-pr-${GITHUB_RUN_NUMBER}"
          git checkout -b $BRANCH
          git add updates/update.txt
          git commit -m "Automated update #${GITHUB_RUN_NUMBER}"
          git push origin $BRANCH

      # Create PR
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          branch: "auto-pr-${{ github.run_number }}"
          title: "Automated Update PR #${{ github.run_number }}"
          body: "This PR was created automatically."
          base: main

      # Enable Auto Merge
      - name: Enable Auto Merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          merge-method: squash

      # Delete branch after merge
      - name: Delete branch after merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: |
          PR_NUMBER=${{ steps.cpr.outputs.pull-request-number }}
          echo "Waiting for PR #$PR_NUMBER to merge..."
          # Install jq if not available
          sudo apt-get update && sudo apt-get install -y jq
          # Poll until PR is merged
          while true; do
            MERGED=$(curl -s -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER | jq -r .merged)
            if [ "$MERGED" = "true" ]; then
              echo "PR #$PR_NUMBER merged, deleting branch..."
              git push origin --delete "auto-pr-${GITHUB_RUN_NUMBER}"
              break
            else
              echo "PR not merged yet, waiting 10s..."
              sleep 10
            fi
          done
