name: Auto PR Creator

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Create timestamp update
        run: |
          mkdir -p updates
          echo "Last update: $(date -u)" >> updates/update.txt

      - name: Create unique branch and commit
        run: |
          BRANCH="auto-pr-${GITHUB_RUN_NUMBER}"
          git checkout -b $BRANCH
          git add updates/update.txt
          git commit -m "Automated update #${GITHUB_RUN_NUMBER}"
          git push origin $BRANCH

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          branch: "auto-pr-${{ github.run_number }}"
          title: "Automated Update PR #${{ github.run_number }}"
          body: "This PR was created automatically."
          base: main

      - name: Enable Auto Merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          merge-method: squash
