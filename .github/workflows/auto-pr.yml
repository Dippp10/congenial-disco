name: Auto PR Creator

on:
  schedule:
    - cron: '0 */6 * * *'   # runs every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}

      # Step 2: Configure Git user
      - name: Configure Git user
        run: |
          git config user.name "Dippp10"
          git config user.email "deepikakarthik697@gmail.com"

      # Step 3: Create timestamped update
      - name: Create timestamp update
        run: |
          mkdir -p updates
          echo "Last update: $(date -u)" >> updates/update.txt

      # Step 4: Create unique branch and commit
      - name: Create branch and push
        run: |
          BRANCH="auto-pr-${GITHUB_RUN_NUMBER}"
          git checkout -b $BRANCH
          git add updates/update.txt
          git commit -m "Automated update #${GITHUB_RUN_NUMBER}"
          git push origin $BRANCH

      # Step 5: Create Pull Request
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          branch: "auto-pr-${{ github.run_number }}"
          title: "Automated Update PR #${{ github.run_number }}"
          body: "This PR was created automatically."
          base: main

      # Step 6: Enable Auto Merge
      - name: Enable Auto Merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          merge-method: squash
